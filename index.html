<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 影视自媒体解说驾驶舱</title>
    <style>
        :root { --bg: #0b0d19; --card: #16192b; --text: #f3f4f6; --accent: #5865f2; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .filter-btn { background: var(--card); border: 1px solid #2d314d; color: var(--text); padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-right: 10px; }
        .filter-btn.active { background: var(--accent); }
        .movie-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        .movie-row { border-bottom: 1px solid #2d314d; cursor: pointer; transition: 0.2s; }
        .movie-row:hover { background: #1f233d; }
        td { padding: 15px; vertical-align: middle; }
        .poster { width: 50px; height: 75px; border-radius: 6px; object-fit: cover; background: #2d314d; }
        .detail-panel { display: none; background: #121526; padding: 20px; border-bottom: 1px solid #2d314d; }
        .badge { background: #ff9f43; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎬 我的影视自媒体灵感舱</h2>
        <div>
            <button class="filter-btn active" onclick="filterGenre('全部')">全部</button>
            <button class="filter-btn" onclick="filterGenre('剧情')">剧情</button>
        </div>
    </div>

    <table class="movie-table">
        <tbody id="movie-list">
            </tbody>
    </table>

    <script>
        let allMovies = [];

        // 核心逻辑：从同目录下的 data.json 读取最新数据
        async function loadData() {
            try {
                const response = await fetch('data.json');
                allMovies = await response.json();
                renderMovies(allMovies);
            } catch (e) {
                document.getElementById('movie-list').innerHTML = `<tr><td style="color:red">数据加载失败，请确保自动化脚本已成功运行并生成 data.json</td></tr>`;
            }
        }

        function renderMovies(movies) {
            const list = document.getElementById('movie-list');
            list.innerHTML = '';
            
            movies.forEach((movie, index) => {
                const isChecked = localStorage.getItem(`check-${movie.title}`) === 'true' ? 'checked' : '';
                
                // 每一行的表格 HTML
                list.innerHTML += `
                    <tr class="movie-row" onclick="toggleDetail(${index})">
                        <td width="50"><input type="checkbox" ${isChecked} onclick="event.stopPropagation(); saveCheck('${movie.title}', this)"></td>
                        <td width="60"><img class="poster" src="${movie.poster || ''}" alt="海报"></td>
                        <td>
                            <strong style="font-size:16px;">${movie.title}</strong>
                            <div style="margin-top:5px;"><span class="badge">TMDB: ${movie.rating_tmdb || '暂无'}</span></div>
                        </td>
                        <td align="right" style="color:#a0aec0;">点击展开 AI 选题建议 ▽</td>
                    </tr>
                    <tr id="detail-${index}" class="detail-panel">
                        <td colspan="4">
                            <div style="border-left: 3px solid var(--accent); padding-left: 15px;">
                                <h4 style="margin: 0 0 10px 0; color: #5865f2;">💡 Gemini AI 独家解说思路：</h4>
                                <p style="line-height: 1.6; color: #cbd5e1; margin: 0;">${movie.ai_insight || 'AI 正在全力憋稿中...'}</p>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleDetail(index) {
            const panel = document.getElementById(`detail-${index}`);
            panel.style.display = panel.style.display === 'table-row' ? 'none' : 'table-row';
        }

        function saveCheck(title, box) {
            localStorage.setItem(`check-${title}`, box.checked);
        }

        function filterGenre(genre) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (genre === '全部') {
                renderMovies(allMovies);
            } else {
                const filtered = allMovies.filter(m => m.genres && m.genres.includes(genre));
                renderMovies(filtered);
            }
        }

        // 页面打开时立刻执行加载
        loadData();
    </script>
</body>
</html>
